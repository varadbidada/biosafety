services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-base
    container_name: denguecast-api
    ports:
      - "8001:8001"
    environment:
      - api_host=0.0.0.0
      - api_port=8001
      - cors_origins=["http://localhost:5174","http://localhost:80"]
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web-prod
    container_name: denguecast-web
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
